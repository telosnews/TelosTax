# shared/authorities/capitalGains.yaml
module: capitalGains.ts
functions:
  calculatePreferentialRateTax:
    authorities:
      - type: IRC
        section: "1(h)"
        description: "Preferential tax rates of 0%, 15%, and 20% on net capital gains and qualified dividends"
        weight: binding
      - type: IRC
        section: "1(h)(1)(E)"
        description: "25% maximum rate on unrecaptured Section 1250 gain (depreciation on real property)"
        weight: binding
      - type: rev_proc
        reference: "Rev. Proc. 2024-40, Section 3.12"
        description: "Inflation-adjusted thresholds for 0%/15%/20% capital gains rate brackets"
        weight: binding
      - type: form
        reference: "Form 1040, Qualified Dividends and Capital Gain Tax Worksheet"
        weight: explanatory
      - type: form
        reference: "Schedule D Tax Worksheet"
        description: "Used when unrecaptured Section 1250 gain is present; computes min(special, regular) tax"
        weight: explanatory
    scope: "Computes tax on net long-term capital gains and qualified dividends at preferential rates, including 25% rate zone for unrecaptured Section 1250 gain. Uses min(special, regular) comparison per IRC §1(h)."
    limitations:
      - "Does not handle 28% rate on collectibles gain"
      - "NIIT (3.8% surtax) computed separately in niit.ts"
      - "Short-term gains taxed at ordinary rates are handled in brackets.ts"
      - "Net capital loss deduction limited to $3,000 handled in scheduleD.ts"
