# shared/authorities/scheduleA.yaml
module: scheduleA.ts
functions:
  calculateScheduleA:
    authorities:
      - type: IRC
        section: "164"
        description: "Deduction for state and local income, sales, and property taxes"
        weight: binding
      - type: IRC
        section: "163(h)"
        description: "Deduction for qualified residence interest (acquisition indebtedness)"
        weight: binding
      - type: IRC
        section: "170"
        description: "Deduction for charitable contributions subject to AGI percentage limits"
        weight: binding
      - type: IRC
        section: "213"
        description: "Deduction for medical expenses exceeding 7.5% of AGI"
        weight: binding
      - type: IRC
        section: "11042 (TCJA)"
        description: "SALT deduction cap of $10,000 ($5,000 for MFS) effective 2018-2025"
        weight: binding
      - type: form
        reference: "Schedule A (Form 1040)"
        weight: explanatory
    scope: "Computes total itemized deductions by aggregating medical, taxes, interest, charitable contributions, and other deductions subject to applicable limitations"
    limitations:
      - "Does not compare itemized vs. standard deduction (handled in form1040.ts)"
      - "SALT cap may change after TCJA sunset; must be reviewed for post-2025 years"
      - "Charitable contribution carryforwards not tracked"
      - "Mortgage interest limited to $750,000 acquisition indebtedness ($1M for pre-12/16/2017 loans) not fully validated"
      - "Pease limitation suspended through 2025 under TCJA"
